spring.application.name=cooked-service

server.forward-headers-strategy=FRAMEWORK
server.port=${SERVER_PORT:8082}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.jpa.properties.hibernate.default_schema=cooked

# Database Connection
spring.datasource.url=${CUSTOM_DB_URL}
spring.datasource.username=${CUSTOM_DB_USER}
spring.datasource.password=${CUSTOM_DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET search_path TO cooked

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

application.servicename=Cooked

# Google Sign-In — OAuth client ID the ID token is verified against (also used by the
# frontend). Defaults to the shared subscription client; override via GOOGLE_CLIENT_ID.
# The browser origin (e.g. cooked.humanworkstream.com) must be an Authorized JavaScript
# origin on this OAuth client in Google Cloud Console.
google.client-id=${GOOGLE_CLIENT_ID:1002322633665-4vflr39l41uqh3o1vhv5b46ukepc0d16.apps.googleusercontent.com}

# Subscription access gate (server-to-server; X-Api-Key never reaches the browser).
# In production set SUBSCRIPTION_BASE_URL + SUBSCRIPTION_API_KEY via env; the API key is a secret.
subscription.base-url=${SUBSCRIPTION_BASE_URL:http://localhost:8080}
subscription.api-key=${SUBSCRIPTION_API_KEY:}
subscription.service-code=${SUBSCRIPTION_SERVICE_CODE:COOKED}
subscription.gate.enabled=${SUBSCRIPTION_GATE_ENABLED:true}
